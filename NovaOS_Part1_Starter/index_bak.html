<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>NovaOS • Intelligence, Flow, Focus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Dynamic Theme Variables */
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4);
      --bg-base: #030305;
      --panel-bg: rgba(15, 15, 20, 0.45);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #8b949e;
      --radius-lg: 32px;
      --radius-md: 20px;
      --blur-intensity: blur(40px);
      --ui-scale: 1rem;
    }

    /* Core Styles */
    body {
      font-family: "Inter", system-ui, sans-serif;
      background-color: var(--bg-base);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      font-size: var(--ui-scale);
      transition: background-color 0.5s ease;
    }

    /* Dynamic Ambient Background */
    .ambient-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      background: 
        radial-gradient(circle at 15% 50%, var(--accent-glow), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(34, 211, 238, 0.15), transparent 40%);
      filter: blur(80px);
      animation: pulseBg 15s ease-in-out infinite alternate;
    }

    @keyframes pulseBg {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    /* Glass & Panel System */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: var(--blur-intensity) saturate(150%);
      -webkit-backdrop-filter: var(--blur-intensity) saturate(150%);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    
    .glass-panel:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 32px 64px -12px rgba(0, 0, 0, 0.6), 0 0 24px var(--accent-glow);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.06);
      transform: translateY(-2px);
    }

    /* Typography & Utilities */
    .font-display { font-family: "Space Grotesk", sans-serif; }
    .text-gradient {
      background: linear-gradient(135deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    /* Inputs & Controls */
    .input-base {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      transition: all 0.2s;
      color: white;
    }
    .input-base:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-accent {
      background: var(--accent);
      color: white;
      transition: all 0.2s;
      box-shadow: 0 8px 16px var(--accent-glow);
    }
    .btn-accent:hover {
      filter: brightness(1.2);
      transform: scale(1.02);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    /* The Notch (Dynamic Island) */
    .notch {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 8px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 320px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .notch:focus-within {
      width: 480px;
      border-radius: 24px;
      background: rgba(15, 15, 20, 0.9);
    }
    
    /* Toast Notifications */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: rgba(20, 20, 25, 0.9); border: 1px solid var(--accent); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 12px; font-size: 0.9rem; animation: slideIn 0.3s ease forwards; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body class="pb-24">
  <!-- Original copy saved for safety -->
</body>
</html>
